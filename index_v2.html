<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Prestige Motors</title><meta name="description" content="Премиальные автомобили"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet"><style>
:root{--bg:#070707;--card:#111;--gold:#c8a66a}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#fff;font-family:Inter,sans-serif}header{padding:7rem 1.5rem;text-align:center}h1{font-size:clamp(2.5rem,8vw,5rem)}.filters,.grid{max-width:1400px;margin:auto}.filters{display:flex;gap:1rem;flex-wrap:wrap;padding:1rem}.filters>*{padding:.9rem;border-radius:14px;background:#151515;color:#fff;border:1px solid #222}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:24px;padding:24px}.card{background:var(--card);border-radius:24px;overflow:hidden;text-decoration:none;color:#fff;transition:.3s}.card:hover{transform:translateY(-6px)}img{width:100%;aspect-ratio:16/10;object-fit:cover}.info{padding:18px}.price{color:var(--gold);font-weight:800}.cta{position:fixed;bottom:12px;left:12px;right:12px;display:none;background:var(--gold);padding:14px;text-align:center;border-radius:14px;color:#000;font-weight:800}@media(max-width:768px){.cta{display:block}}
</style></head><body><header><h1>Prestige Motors</h1><p>Коллекция премиальных автомобилей</p></header><section class="filters"><select id=b></select><input id=p type=range min=50000 max=150000 value=150000><span id=v></span></section><section id=g class=grid></section><a class=cta href='tel:+996700000000'>Позвонить дилеру</a><script>
const d=[["BMW","X5",2023,85000],["Mercedes","GLE",2024,98000],["Porsche","Cayenne",2023,120000],["Audi","Q8",2022,76000],["Lexus","LX600",2024,135000],["Range Rover","Autobiography",2024,145000]];
const imgs=["1555215695-3004980ad54e","1503376780353-7e6692767b70","1502161254066-6c74afbf07aa","1606664515524-ed2f786a0bd6","1492144534655-ae79c964c9d7","1549399542-7e3f8b79c341"];
b.innerHTML='<option value="">Все марки</option>'+[...new Set(d.map(x=>x[0]))].map(x=>`<option>${x}</option>`).join('');
function r(){v.textContent='до $'+p.value;g.innerHTML='';d.forEach((c,i)=>{if((!b.value||c[0]==b.value)&&c[3]<=p.value)g.innerHTML+=`<a class=card href="car.html?id=${i+1}"><img loading=lazy src="https://images.unsplash.com/photo-${imgs[i]}?w=1200&q=80"><div class=info><h3>${c[0]} ${c[1]}</h3><div>${c[2]}</div><div class=price>$${c[3].toLocaleString()}</div></div></a>`})}b.onchange=r;p.oninput=r;r();
</script></body></html>

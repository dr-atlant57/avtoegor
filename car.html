<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DriveHub | Premium Vehicle</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Plus Jakarta Sans',sans-serif; background:#fff; }
    .container { max-width:1280px; margin:0 auto; padding:32px; }
    .back-link { display:inline-block; margin-bottom:32px; font-weight:600; color:#007A5E; text-decoration:none; }
    .car-detail-grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:48px;
    }
    .main-img { width:100%; border-radius:28px; aspect-ratio:4/3; object-fit:cover; }
    .price-large { font-size:52px; font-weight:800; color:#007A5E; margin:16px 0; }
    .spec-list { display:flex; flex-wrap:wrap; gap:20px; margin:28px 0; padding:28px; background:#f7f7f5; border-radius:32px; }
    .spec-item { flex:1; min-width:120px; }
    .spec-label { font-size:13px; text-transform:uppercase; font-weight:700; color:#6b6b6b; }
    .spec-value { font-size:18px; font-weight:700; margin-top:6px; }
    .btn-group { display:flex; gap:16px; margin:32px 0; flex-wrap:wrap; }
    .btn-primary { background:#000; color:white; padding:16px 32px; border-radius:60px; text-decoration:none; font-weight:700; text-align:center; flex:1; }
    .btn-wa { background:#25D366; color:white; padding:16px 32px; border-radius:60px; text-align:center; flex:1; text-decoration:none; font-weight:700; }
    @media (max-width:800px) {
      .car-detail-grid { grid-template-columns:1fr; gap:24px; }
      .container { padding:20px; }
    }
  </style>
</head>
<body>
<div class="container" id="detailRoot">
  <div style="text-align:center; padding:100px 20px;">Загрузка...</div>
</div>
<script>
  const CARS_DB = [
    { id:"bmw-x5-24", brand:"BMW", model:"X5", year:2024, price:56900, mileage:8200, fuel:"Premium", transmission:"Automatic", color:"Brooklyn Grey", vin:"5UX43DP09R9L1234", image:"https://images.unsplash.com/photo-1607853202273-1b494d8c6e5b?w=900", description:"M Sport пакет, контурная подсветка, климат-контроль 4 зоны, гарнитура Harman Kardon." },
    { id:"mercedes-gle", brand:"Mercedes-Benz", model:"GLE 450", year:2023, price:62900, mileage:12400, fuel:"Premium", transmission:"Automatic", color:"Obsidian Black", vin:"4JGFB4KB0PA98765", image:"https://images.unsplash.com/photo-1617814076367-b759c7d9e738?w=900", description:"AMG Line, кожа Nappa, пневмоподвеска, 360° камеры." },
    { id:"audi-q8", brand:"Audi", model:"Q8 Prestige", year:2024, price:72900, mileage:3800, fuel:"Premium", transmission:"Automatic", color:"Daytona Gray", vin:"WA1BVBF12RD89123", image:"https://images.unsplash.com/photo-1606661282733-6c9bc9b2c3c7?w=900", description:"Quattro, Bang & Olufsen 3D, адаптивный круиз." },
    { id:"porsche-cayenne", brand:"Porsche", model:"Cayenne S", year:2023, price:83900, mileage:9400, fuel:"Premium", transmission:"Automatic", color:"Carmine Red", vin:"WP1AB2AY7PDA45678", image:"https://images.unsplash.com/photo-1614200187524-dc4b892acf16?w=900", description:"Sport Chrono, панорамная крыша, кожаные спортивные сиденья." },
    { id:"lexus-rx", brand:"Lexus", model:"RX 350", year:2025, price:54900, mileage:3200, fuel:"Hybrid", transmission:"Automatic", color:"Eminent White", vin:"2T2HZMDA6PC123456", image:"https://images.unsplash.com/photo-1618842676088-c4d48a6a7c9d?w=900", description:"Mark Levinson, проекционный дисплей, полуанилин." }
  ];
  const urlParams = new URLSearchParams(window.location.search);
  const carId = urlParams.get('id');
  const car = CARS_DB.find(c => c.id === carId);
  const container = document.getElementById('detailRoot');
  if (car) {
    container.innerHTML = `
      <a href="/" class="back-link">← Назад к каталогу</a>
      <div class="car-detail-grid">
        <div><img class="main-img" src="${car.image}" alt="${car.brand} ${car.model}"></div>
        <div>
          <h1 style="font-size:42px; font-weight:800;">${car.brand} ${car.model} ${car.year}</h1>
          <div class="price-large">$${car.price.toLocaleString()}</div>
          <div class="spec-list">
            <div class="spec-item"><div class="spec-label">Пробег</div><div class="spec-value">${car.mileage.toLocaleString()} mi</div></div>
            <div class="spec-item"><div class="spec-label">Трансмиссия</div><div class="spec-value">${car.transmission}</div></div>
            <div class="spec-item"><div class="spec-label">Топливо</div><div class="spec-value">${car.fuel}</div></div>
            <div class="spec-item"><div class="spec-label">Цвет</div><div class="spec-value">${car.color}</div></div>
            <div class="spec-item"><div class="spec-label">VIN</div><div class="spec-value">${car.vin}</div></div>
          </div>
          <p style="font-size:16px; line-height:1.5; margin:12px 0;">${car.description}</p>
          <div class="btn-group">
            <a href="tel:+16128882025" class="btn-primary">📞 Позвонить дилеру</a>
            <a href="https://wa.me/16128882025" class="btn-wa" target="_blank">💬 Написать в WhatsApp</a>
          </div>
          <div style="background:#f0f0ef; padding:20px; border-radius:28px; margin-top:32px;">
            ⚡ Кредит от 0.9% | Лизинг 24-60 мес | Обмен авто
          </div>
        </div>
      </div>
    `;
  } else {
    container.innerHTML = `<h1>Автомобиль не найден</h1><a href="/">Вернуться в каталог</a>`;
  }
</script>
</body>
</html>

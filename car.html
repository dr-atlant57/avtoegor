<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle Portfolio | YISHU LUXURY</title>
  <meta name="description" content="Technical specification, dynamic history report and secure test drive orchestration.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800;900&display=swap" rel="stylesheet">
  
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  <script id="schema-block" type="application/ld+json"></script>

  <style>
    :root {
      --bg: #050505;
      --surface: #0f0f11;
      --border: #1f1f24;
      --text: #f3f4f6;
      --text-muted: #888893;
      --accent: #00a86b;
      --accent-hover: #0fd68a;
      --font: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--bg); color: var(--text); font-family: var(--font); line-height: 1.5; -webkit-font-smoothing: antialiased; }

    header { border-bottom: 1px solid var(--border); background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; }
    .nav-container { max-width: 1400px; margin: 0 auto; padding: 1.25rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.05em; text-transform: uppercase; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    .back-btn { text-decoration: none; color: var(--text-muted); font-size: 0.9rem; font-weight: 500; transition: color 0.2s ease; }
    .back-btn:hover { color: #fff; }

    .main-layout { max-width: 1400px; margin: 3rem auto; padding: 0 2rem; display: grid; grid-template-columns: 1fr 450px; gap: 4rem; }

    /* VEHICLE GALLERY COMPONENT */
    .gallery-container { width: 100%; display: flex; flex-direction: column; gap: 1rem; }
    .main-stage { width: 100%; aspect-ratio: 16/9; background: #111; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
    .main-stage img { width: 100%; height: 100%; object-fit: cover; }
    .thumbnails-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    .thumb { aspect-ratio: 16/10; border-radius: 10px; overflow: hidden; cursor: pointer; border: 2px solid transparent; background: #111; opacity: 0.5; transition: all 0.2s ease; }
    .thumb.active { border-color: var(--accent); opacity: 1; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }

    /* CORE SPECIFICATIONS */
    .title-block { margin: 2rem 0 1.5rem 0; }
    .title-upper { display: flex; justify-content: space-between; align-items: baseline; }
    .title-upper h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -0.03em; }
    .live-counter { font-size: 0.85rem; color: var(--accent); background: rgba(0,168,107,0.1); padding: 0.25rem 0.6rem; border-radius: 4px; font-weight: 600; }
    .vin-badge { font-family: monospace; font-size: 0.9rem; color: var(--text-muted); margin-top: 0.25rem; display: block;}

    .tech-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin: 2.5rem 0; }
    .spec-item { background: var(--surface); padding: 1.25rem; border-radius: 12px; border: 1px solid var(--border); }
    .spec-item span { display: block; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    .spec-item strong { font-size: 1.1rem; color: #fff; font-weight: 600; }

    .description-text { color: var(--text-muted); font-size: 1.05rem; font-weight: 300; line-height: 1.7; margin-bottom: 3rem; }

    /* EDGE SIDEBAR FORM & CONSOLE */
    .sidebar-panel { position: sticky; top: 120px; height: fit-content; display: flex; flex-direction: column; gap: 2rem; }
    .financial-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 2rem; }
    .sidebar-price { font-size: 2.5rem; font-weight: 900; letter-spacing: -0.04em; color: #fff; margin-bottom: 1.5rem; }

    .comms-layer { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .comm-btn { padding: 0.85rem; border-radius: 12px; font-weight: 600; text-decoration: none; text-align: center; font-size: 0.9rem; transition: all 0.2s ease; }
    .btn-phone { background: #fff; color: #000; }
    .btn-phone:hover { background: #e5e7eb; }
    .btn-wa { background: #25d366; color: #fff; }
    .btn-wa:hover { opacity: 0.9; }

    /* TEST DRIVE APPLICATION FORM */
    .booking-form { display: flex; flex-direction: column; gap: 1rem; border-top: 1px solid var(--border); padding-top: 1.5rem; }
    .booking-form h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.25rem; }
    .booking-form input { background: var(--bg); border: 1px solid var(--border); padding: 0.85rem 1rem; border-radius: 8px; color: #fff; font-family: var(--font); outline: none; transition: border-color 0.2s ease; }
    .booking-form input:focus { border-color: var(--accent); }
    .submit-btn { background: var(--accent); color: #fff; border: none; padding: 1rem; border-radius: 8px; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: background 0.2s ease; margin-top: 0.5rem; }
    .submit-btn:hover { background: var(--accent-hover); }

    /* DIGITAL MAP EMBED (CLS IMMUNE CONTAINER) */
    .dealer-map-box { width: 100%; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 16/7; background: #111; margin-top: 2rem; }
    .dealer-map-box iframe { width: 100%; height: 100%; border: 0; filter: grayscale(1) invert(1) contrast(1.2); }

    /* MOBILE-FIRST OPTIMIZATION PARADIGM */
    @media (max-width: 1024px) {
      .main-layout { grid-template-columns: 1fr; gap: 2.5rem; }
      .sidebar-panel { position: relative; top: 0; }
    }

    @media (max-width: 768px) {
      .main-layout { padding: 0 1rem; margin: 1.5rem auto; }
      .title-upper h1 { font-size: 1.8rem; }
      .tech-grid { grid-template-columns: 1fr; gap: 1rem; }
      .dealer-map-box { aspect-ratio: 16/10; }
      
      .mobile-sticky-action-wrap {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(5, 5, 5, 0.9);
        backdrop-filter: blur(20px);
        border-top: 1px solid var(--border);
        padding: 1rem;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        z-index: 999;
      }
      .mobile-sticky-action-wrap .comm-btn { padding: 1.1rem; font-size: 1rem; border-radius: 14px; }
      .main-layout { margin-bottom: 7rem; }
    }

    @media (min-width: 769px) {
      .mobile-sticky-action-wrap { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">YISHU<span>.</span></a>
      <a href="index.html" class="back-btn">&larr; Return to Inventory</a>
    </div>
  </header>

  <main class="main-layout">
    
    <div class="content-left">
      <div class="gallery-container">
        <div class="main-stage">
          <img id="stageImg" src="" alt="Vehicle Presentation" width="800" height="450">
        </div>
        <div class="thumbnails-strip" id="thumbStrip">
          </div>
      </div>

      <div class="title-block">
        <div class="title-upper">
          <h1 id="vehicleTitle">Loading Machine Portfolio...</h1>
          <span class="live-counter" id="viewCount">... views</span>
        </div>
        <span class="vin-badge" id="vinDisplay"></span>
      </div>

      <div class="tech-grid" id="specsGrid">
        </div>

      <p class="description-text" id="descDisplay"></p>
      
      <h2>Showroom Location</h2>
      <div class="dealer-map-box">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2830.413725450438!2d-93.38543462343997!3d44.9759458652391!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x52b333481b7a2d4b%3A0x6e8e84ef2bc2543e!2sGolden%20Valley%2C%20MN!5e0!3m2!1sen!2sus!4v1700000000000!5m2!1sen!2sus" allowfullscreen="" loading="lazy"></iframe>
      </div>
    </div>

    <div class="sidebar-panel">
      <div class="financial-card">
        <div class="sidebar-price" id="priceDisplay">...</div>
        
        <div class="comms-layer">
          <a href="tel:+16125550199" class="comm-btn btn-phone" onclick="alert('Connecting to Senior Luxury Advisor...')">Call</a>
          <a href="https://wa.me/16125550199" target="_blank" class="comm-btn btn-wa">WhatsApp</a>
        </div>

        <form class="booking-form" action="#" method="POST" onsubmit="return handleFormSubmit(event)">
          <h3>Reserve Test Drive</h3>
          <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:0.5rem;">Instant sync with showroom schedules.</p>
          
          <input type="text" name="client_name" placeholder="Full Name" required>
          <input type="tel" name="client_phone" placeholder="Phone Number" required>
          
      
          
          <button type="submit" class="submit-btn">Request Orchestration</button>
        </form>
      </div>
    </div>
  </main>

  <div class="mobile-sticky-action-wrap">
    <a href="tel:+16125550199" class="comm-btn btn-phone" onclick="alert('Connecting to Senior Luxury Advisor...')">Call</a>
    <a href="https://wa.me/16125550199" target="_blank" class="comm-btn btn-wa">WhatsApp</a>
  </div>

  <script>
    // SHARED REPLICATED IN-MEMORY INVENTORY
    const INVENTORY = {
      "porsche-911": {
        brand: "Porsche", model: "911 Carrera S", year: 2023, price: 142500, mileage: "4,200 mi", engine: "3.0L Twin-Turbo H6", transmission: "8-Speed PDK", drivetrain: "RWD", vin: "WP0AB2A90NS2XXXXX", color: "Jet Black Metallic",
        img: "https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?auto=format&fit=crop&w=800&q=80",
        desc: "An immaculate incarnation of pure engineering perfection. This single-owner Porsche 911 Carrera S features bespoke carbon architecture, active suspension control, and a factory sport exhaust setup. Maintained exclusively in climate-controlled isolation."
      },
      "amg-gt": {
        brand: "Mercedes-Benz", model: "AMG GT 53 4-Door", year: 2022, price: 118900, mileage: "11,500 mi", engine: "3.0L Inline-6 Turbo", transmission: "9-Speed AMG SPEEDSHIFT", drivetrain: "4MATIC+", vin: "WD07A63D7NA1XXXXX", color: "Graphite Grey Magno",
        img: "https://images.unsplash.com/photo-1617531653332-bd46c24f2068?auto=format&fit=crop&w=800&q=80",
        desc: "The absolute nexus of executive comfort and race-bred violence. Powered by an electrified turbocharged inline-six, delivering raw performance package across an active torque-vectoring chassis system."
      },
      "bmw-m8": {
        brand: "BMW", model: "M8 Competition Gran Coupe", year: 2023, price: 134900, mileage: "2,800 mi", engine: "4.4L Twin-Turbo V8", transmission: "8-Speed M Steptronic", drivetrain: "xDrive", vin: "WBSGV0C59NLBXXXXX", color: "Alpine White",
        img: "https://images.unsplash.com/photo-1555215695-3004980ad54e?auto=format&fit=crop&w=800&q=80",
        desc: "A brutal display of power cloaked in dynamic luxury. The M8 Competition Gran Coupe produces 617 horsepower from its twin-turbocharged V8 heart. Full individual leather packages accent an pristine cockpit framework."
      },
      "audi-rs7": {
        brand: "Audi", model: "RS7 Sportback", year: 2022, price: 114000, mileage: "14,100 mi", engine: "4.0L Twin-Turbo V8", transmission: "8-Speed Tiptronic", drivetrain: "quattro", vin: "WA1V2BF21N1DXXXXX", color: "Nardo Gray",
        img: "https://images.unsplash.com/photo-1606016159991-dfe4f2746ad5?auto=format&fit=crop&w=800&q=80",
        desc: "Sculpted speed lines fused with unmistakable structural aggression. Features dynamic all-wheel steering, ceramic brakes systems, and RS-tuned adaptive air configuration layouts."
      },
      "lexus-lc": {
        brand: "Lexus", model: "LC 500 Performance", year: 2021, price: 89500, mileage: "18,900 mi", engine: "5.0L Naturally Aspirated V8", transmission: "10-Speed Sport Direct Shift", drivetrain: "RWD", vin: "TH1AY18Z6MA0XXXXX", color: "Infrared Premium Paint",
        img: "https://images.unsplash.com/photo-1616422285623-13ff0162193c?auto=format&fit=crop&w=800&q=80",
        desc: "A rolling sculpture powered by one of the final legendary naturally aspirated high-revving 5.0L V8 powertrains. Impeccable Japanese craftmanship with bespoke alcantara cabin configurations."
      },
      "range-rover": {
        brand: "Land Rover", model: "Range Rover Autobiography", year: 2023, price: 158000, mileage: "6,400 mi", engine: "4.4L Twin-Turbo V8", transmission: "8-Speed Automatic", drivetrain: "4WD", vin: "SALWR2RE7PA8XXXXX", color: "Santorini Black",
        img: "https://images.unsplash.com/photo-1609521263047-f8f205293f24?auto=format&fit=crop&w=800&q=80",
        desc: "The pinnacle of world-class exploration luxury. Autobiography specifications offer executive rear seating configurations, acoustic private glass isolations, and uncompromised surface handling packages."
      }
    };

    // ROUTER PARSER ENGINE
    const urlParams = new URLSearchParams(window.location.search);
    const carId = urlParams.get('id') || "porsche-911"; // Fallback architecture to protect user flow
    const car = INVENTORY[carId];

    if (!car) {
      window.location.href = 'index.html'; // Instant graceful rerouting if database call fails
    } else {
      // INJECT REAL TIME SEO DATA PADS
      document.getElementById('schema-block').innerText = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "Vehicle",
        "name": `${car.brand} ${car.model}`,
        "modelYear": car.year,
        "color": car.color,
        "vin": car.vin,
        "driveWheelConfiguration": car.drivetrain,
        "offers": {
          "@type": "Offer",
          "price": car.price,
          "priceCurrency": "USD",
          "availability": "https://schema.org/InStock"
        }
      });

      // INJECT STATIC RENDERS
      document.title = `${car.year} ${car.brand} ${car.model} | YISHU Portfolio`;
      document.getElementById('vehicleTitle').innerText = `${car.brand} ${car.model}`;
      document.getElementById('vinDisplay').innerText = `VIN: ${car.vin}`;
      document.getElementById('priceDisplay').innerText = `$${car.price.toLocaleString()}`;
      document.getElementById('descDisplay').innerText = car.desc;
      
      const stage = document.getElementById('stageImg');
      stage.src = car.img;

      // SPECIFICATION MATRIX CONSTRUCTION
      document.getElementById('specsGrid').innerHTML = `
        <div class="spec-item"><span>Year</span><strong>${car.year}</strong></div>
        <div class="spec-item"><span>Mileage</span><strong>${car.mileage}</strong></div>
        <div class="spec-item"><span>Engine</span><strong>${car.engine}</strong></div>
        <div class="spec-item"><span>Drivetrain</span><strong>${car.drivetrain}</strong></div>
        <div class="spec-item"><span>Transmission</span><strong>${car.transmission}</strong></div>
        <div class="spec-item"><span>Exterior Paint</span><strong>${car.color}</strong></div>
      `;

      // MULTIANGLE HIGH SPEED GALLERY MANAGEMENT
      const alternateAngles = [
        car.img,
        "https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=800&q=80",
        "https://images.unsplash.com/photo-1542282088-fe8426682b8f?auto=format&fit=crop&w=800&q=80",
        "https://images.unsplash.com/photo-1580273916550-e323be2ae537?auto=format&fit=crop&w=800&q=80"
      ];

      const thumbStrip = document.getElementById('thumbStrip');
      thumbStrip.innerHTML = alternateAngles.map((url, index) => `
        <div class="thumb ${index === 0 ? 'active' : ''}" onclick="switchActivePhoto(this, '${url}')">
          <img src="${url}" alt="Perspective ${index + 1}">
        </div>
      `).join('');

      // LOCAL STORAGE ENGINE FOR DYNAMIC TELEMETRY COUNTER
      let views = localStorage.getItem(`views_${carId}`) || Math.floor(Math.random() * 140) + 45;
      views = parseInt(views) + 1;
      localStorage.setItem(`views_${carId}`, views);
      document.getElementById('viewCount').innerText = `${views} Premium views`;
    }

    function switchActivePhoto(element, url) {
      document.getElementById('stageImg').src = url;
      document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
      element.classList.add('active');
    }

    function handleFormSubmit(event) {
      event.preventDefault();
      alert("Security Token Verified. Reservation orchestrated successfully. An Executive Specialist will secure contact within 5 minutes.");
      return false;
    }
  </script>
</body>
</html>

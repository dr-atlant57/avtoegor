<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Автокаталог | ABC Cars Clone</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div class="container">
    <h1>🚗 Каталог автомобилей</h1>
    
    <!-- Поиск и фильтры -->
    <div class="filters">
      <input type="text" id="searchInput" placeholder="Поиск по марке или модели" class="search-box">
      <select id="brandFilter">
        <option value="">Все марки</option>
        <option value="BMW">BMW</option>
        <option value="Toyota">Toyota</option>
      </select>
      <input type="number" id="maxPrice" placeholder="Макс. цена $" class="price-filter">
    </div>

    <!-- Сетка машин (заполнится через JS) -->
    <div id="carsGrid" class="cars-grid">
      <div class="loading">Загрузка...</div>
    </div>
  </div>

  <script src="/assets/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2019 Subaru Crosstrek Premium AWD | For Sale Golden Valley</title>
  <meta name="description" content="Pre-owned 2019 Subaru Crosstrek Premium in Cool Gray Khaki. 98k miles, Symmetrical AWD. Clean title. Price: $17,900.">
  
  <link rel="canonical" href="https://your-cloudflare-subdomain.pages.dev/">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Vehicle",
    "name": "2019 Subaru Crosstrek Premium",
    "modelYear": 2019,
    "color": "Cool Gray Khaki",
    "driveWheelConfiguration": "AllWheelDrive",
    "mileageFromOdometer": {
      "@type": "QuantitativeValue",
      "value": 98000,
      "unitCode": "SMI"
    },
    "offers": {
      "@type": "Offer",
      "price": "17900",
      "priceCurrency": "USD",
      "availability": "https://schema.org/InStock"
    }
  }

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  <style>
    :root {
      --bg: #0a0a0c;
      --text: #f3f4f6;
      --accent: #ff4d4d;
      --surface: #16161a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }
    .badge {
      background: var(--accent);
      color: #fff;
      padding: 0.3rem 0.8rem;
      font-size: 0.8rem;
      font-weight: bold;
      text-transform: uppercase;
      border-radius: 4px;
      margin-bottom: 1rem;
    }
    h1 { font-size: 3.5rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 0.5rem; }
    .trim { font-size: 1.5rem; color: #888; margin-bottom: 1.5rem; }
    .price { font-size: 2.5rem; font-weight: bold; color: #4ade80; margin-bottom: 2rem; }
    
    .image-container {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16/9;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ХАК АНИМАЦИИ НА СКРОЛЛ ПАЛЬЦЕМ */
    @supports (animation-timeline: scroll()) {
      .image-container img {
        animation: scaleImage linear both;
        animation-timeline: scroll();
        animation-range: start 0% exit 100%;
      }
    }
    @keyframes scaleImage {
      to { transform: scale(1.1) translateY(20px); }
    }

    .specs { padding: 5rem 2rem; max-width: 1200px; margin: 0 auto; }
    .specs h2 { margin-bottom: 2rem; font-size: 2rem; text-align: center; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
    .card { background: var(--surface); padding: 1.5rem; border-radius: 8px; border: 1px solid #222; }
    .card span { color: #666; display: block; font-size: 0.9rem; }
    .card strong { font-size: 1.2rem; color: #fff; }

    .lead-form { background: var(--surface); padding: 5rem 2rem; display: flex; justify-content: center; }
    .form-box { width: 100%; max-width: 500px; text-align: center; }
    .form-box h3 { margin-bottom: 1rem; font-size: 1.8rem; }
    .form-box p { color: #888; margin-bottom: 2rem; }
    form { display: flex; flex-direction: column; gap: 1rem; }
    input { background: #000; border: 1px solid #333; padding: 1rem; border-radius: 6px; color: #fff; font-size: 1rem; }
    input:focus { border-color: var(--accent); outline: none; }
    .cf-turnstile { display: flex; justify-content: center; margin: 0.5rem 0; }
    button { background: var(--accent); color: #fff; border: none; padding: 1.2rem; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; }

    @media (max-width: 768px) {
      h1 { font-size: 2.2rem; }
      .trim { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <header class="hero">
    <span class="badge">🔥 Hot Offer / Symmetrical AWD</span>
    <h1>2019 Subaru Crosstrek</h1>
    <p class="trim">Premium Trim • Subcompact SUV</p>
    <div class="price">$17,900</div>
    
    <div class="image-container">
      <img src="subaru.avif" alt="2019 Subaru Crosstrek Premium">
    </div>
  </header>

  <main class="specs">
    <h2>Vehicle Specifications</h2>
    <div class="grid">
      <div class="card"><span>Mileage:</span> <strong>98,000 miles</strong></div>
      <div class="card"><span>Drivetrain:</span> <strong>Symmetrical AWD</strong></div>
      <div class="card"><span>Engine:</span> <strong>2.0L H4 16V GDI DOHC</strong></div>
      <div class="card"><span>Exterior Color:</span> <strong>Cool Gray Khaki</strong></div>
    </div>
  </main>

  <section class="lead-form">
    <div class="form-box">
      <h3>Schedule a Test Drive in Golden Valley</h3>
      <p>Secure connection. No spam.</p>
      
      <form action="#" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="tel" name="phone" placeholder="Phone Number" required>
        
        <div class="cf-turnstile" data-sitekey="1x00000000000000000000AA" data-theme="dark"></div>
        
        <button type="submit">Submit Request</button>
      </form>
    </div>
  </section>

</body>
</html>

<div class="container" style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border);">
  <h3>🔑 Авторизация разработчика</h3>
  <input type="password" id="ghToken" placeholder="Введите ваш GitHub Personal Token" style="width: 100%; margin-top: 0.5rem;">
</div>

<script>
  // Конфиг репозитория (эти данные публичные, их скрывать не нужно)
  const REPO_OWNER = "твой_логин_github";
  const REPO_NAME = "имя_твоего_репозитория";
  const FILE_PATH = "data/vehicles.json";

  document.getElementById('carForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msgDiv = document.getElementById('msg');
    
    // Берем токен из поля ввода прямо в момент отправки
    const GITHUB_TOKEN = document.getElementById('ghToken').value.trim();
    
    if (!GITHUB_TOKEN) {
      msgDiv.innerText = '❌ Ошибка: Введите GitHub Token для авторизации!';
      return;
    }

    msgDiv.innerText = '⏳ Безопасное соединение с репозиторием...';

    const newCar = {
      id: `${document.getElementById('brand').value.toLowerCase().replace(/ /g, '-')}-${document.getElementById('model').value.toLowerCase().replace(/ /g, '-')}`,
      brand: document.getElementById('brand').value,
      model: document.getElementById('model').value,
      year: parseInt(document.getElementById('year').value),
      price: parseInt(document.getElementById('price').value),
      mileage: parseInt(document.getElementById('mileage').value || 0).toLocaleString() + " mi",
      engine: "3.0L Twin-Turbo",
      transmission: "Automatic",
      img: document.getElementById('photos').value.split(',')[0].trim(),
      badge: "New Arrival"
    };

    try {
      const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
      
      // Запрос идет с токеном, который ты ввел вручную
      const fileRes = await fetch(url, {
        headers: { "Authorization": `token ${GITHUB_TOKEN}` }
      });
      
      if (fileRes.status === 401 || fileRes.status === 403) {
        msgDiv.innerText = '❌ Ошибка: Неверный или просроченный токен доступа!';
        return;
      }

      let currentData = [];
      let sha = null;

      if (fileRes.status === 200) {
        const fileJson = await fileRes.json();
        sha = fileJson.sha;
        currentData = JSON.parse(atob(fileJson.content));
      }

      currentData.push(newCar);

      const updateRes = await fetch(url, {
        method: "PUT",
        headers: {
          "Authorization": `token ${GITHUB_TOKEN}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: `Консоль: добавлен автомобиль ${newCar.brand} ${newCar.model}`,
          content: btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2)))),
          sha: sha
        })
      });

      if (updateRes.ok) {
        msgDiv.innerText = '✅ Данные проверены и записаны в коммит! ИИ-граф обновляется.';
        document.getElementById('carForm').reset();
      } else {
        msgDiv.innerText = '❌ Ошибка записи (проверьте права токена)';
      }
    } catch (err) {
      msgDiv.innerText = '❌ Критическая ошибка сети';
      console.error(err);
    }
  });
</script>
